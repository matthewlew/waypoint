<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Waypoint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────
   shadcn/ui variables (Zinc palette)
──────────────────────────────────────────────── */
:root {
  --background: 0 0% 100%;
  --foreground: 240 10% 3.9%;
  --card: 0 0% 100%;
  --card-foreground: 240 10% 3.9%;
  --popover: 0 0% 100%;
  --popover-foreground: 240 10% 3.9%;
  --primary: 240 5.9% 10%;
  --primary-foreground: 0 0% 98%;
  --secondary: 240 4.8% 95.9%;
  --secondary-foreground: 240 5.9% 10%;
  --muted: 240 4.8% 95.9%;
  --muted-foreground: 240 3.8% 46.1%;
  --accent: 240 4.8% 95.9%;
  --accent-foreground: 240 5.9% 10%;
  --destructive: 0 84.2% 60.2%;
  --destructive-foreground: 0 0% 98%;
  --border: 240 5.9% 90%;
  --input: 240 5.9% 90%;
  --ring: 240 10% 3.9%;
  --radius: 0.5rem;

  /* Additional colors for specialized usage keeping original intent but adjusting to HSL */
  --rose: 329 46% 42%;     /* #9F3A6E */
  --rose-bg: 329 100% 97%; /* #FDF2F8 */
  --rose-mid: 323 60% 84%; /* #F0BEDD */

  --amb: 37 83% 31%;       /* #92400E */
  --amb-bg: 44 100% 95%;   /* #FFFBEB */

  --grn: 142 64% 24%;      /* #166534 */
  --grn-bg: 152 76% 96%;   /* #ECFDF5 */

  --flt: 263 70% 50%;      /* #6D28D9 */
  --flt-bg: 250 100% 98%;  /* #F5F3FF */

  --r: calc(var(--radius) + 4px);
  --rs: var(--radius);
  --rsm: calc(var(--radius) - 2px);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:hsl(var(--background));color:hsl(var(--foreground));
  height:100%;overflow:hidden;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:pan-y;
}
.scr{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
.scr::-webkit-scrollbar{display:none}

/* ══════════════════════════════
   SETUP
══════════════════════════════ */
.setup{position:fixed;inset:0;background:hsl(var(--background));z-index:500;
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.setup::-webkit-scrollbar{display:none}
.setup.gone{display:none}

.setup-top{
  padding:52px 24px 32px;
  background:hsl(var(--card));
  border-bottom:1px solid hsl(var(--border));
}
.logo{
  font-size:30px;font-weight:700;color:hsl(var(--foreground));
  letter-spacing:-.5px;line-height:1;
}
.logo span{color:hsl(var(--primary))}
.logo-sub{font-size:15px;color:hsl(var(--muted-foreground));margin-top:6px;font-weight:400}

.sf{padding:0 20px}
.sf-lbl{
  display:block;font-size:13px;font-weight:500;
  color:hsl(var(--muted-foreground));margin:20px 0 7px;
}
.sf-inp{
  width:100%;background:hsl(var(--card));
  border:1px solid hsl(var(--border));border-radius:var(--rs);
  padding:12px 14px;font-family:'Inter',sans-serif;
  font-size:16px;color:hsl(var(--foreground));outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.sf-inp::placeholder{color:hsl(var(--muted-foreground))}
.sf-inp:focus{border-color:hsl(var(--ring));box-shadow:0 0 0 2px hsl(var(--background)), 0 0 0 4px hsl(var(--ring))}
.sf-row{display:flex;gap:8px}
.sf-row .sf-inp{flex:1}
.sf-mini{width:76px;flex-shrink:0;text-align:center}

.who-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.who-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:hsl(var(--card));border:1px solid hsl(var(--border));
  border-radius:20px;padding:5px 12px;
  font-size:14px;color:hsl(var(--card-foreground));
}
.who-x{color:hsl(var(--muted-foreground));cursor:pointer;font-size:15px;line-height:1}
.who-row{display:flex;gap:8px}
.who-row .sf-inp{flex:1}
.who-add-btn{
  background:hsl(var(--card));border:1px solid hsl(var(--border));
  border-radius:var(--rs);padding:0 14px;
  font-size:20px;color:hsl(var(--muted-foreground));cursor:pointer;
}

.dest-list{display:flex;flex-direction:column;gap:6px}
.dest-row,.et-dest-row{
  display:flex;align-items:center;gap:7px;
  touch-action:none;transition:opacity .15s;
}
.dest-row.dragging,.et-dest-row.dragging{opacity:.35}
.dest-row.drag-over,.et-dest-row.drag-over{
  outline:2px solid hsl(var(--primary));border-radius:var(--rs);
}
.drag-handle,.et-handle{
  color:hsl(var(--muted-foreground));cursor:grab;font-size:17px;
  padding:8px 4px;flex-shrink:0;user-select:none;touch-action:none;
}
.dest-row .sf-inp{flex:1}
.dest-rm{
  width:32px;height:32px;border-radius:var(--rs);
  border:1px solid hsl(var(--border));background:none;
  color:hsl(var(--muted-foreground));font-size:16px;cursor:pointer;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.dest-rm:active{border-color:#DC2626;color:#DC2626}

.add-dest-btn{
  width:100%;margin-top:6px;padding:11px;
  border:1px dashed hsl(var(--border));border-radius:var(--rs);
  background:none;font-family:'Inter',sans-serif;
  font-size:15px;color:hsl(var(--muted-foreground));cursor:pointer;
}
.add-dest-btn:active{border-color:hsl(var(--primary));color:hsl(var(--primary))}

.setup-cta{
  width:100%;margin-top:28px;padding:15px;
  background:hsl(var(--primary));border:none;border-radius:var(--r);
  font-family:'Inter',sans-serif;font-size:16px;font-weight:600;
  color:hsl(var(--primary-foreground));cursor:pointer;letter-spacing:.01em;
}
.setup-cta:hover{background:hsl(var(--primary)/.9)}
.setup-cta:active{background:hsl(var(--primary)/.8)}

/* ══════════════════════════════
   APP SHELL
══════════════════════════════ */
.app{height:100%;display:flex;flex-direction:column;overflow:hidden;background:hsl(var(--background))}

.hdr{
  flex-shrink:0;background:hsl(var(--card));
  border-bottom:1px solid hsl(var(--border));
  padding:13px 16px 11px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.hdr-left{flex:1;min-width:0}
.hdr-trip{
  font-size:18px;font-weight:700;color:hsl(var(--foreground));
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;
}
.hdr-meta{
  font-size:13px;color:hsl(var(--muted-foreground));margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hdr-edit{font-size:14px;font-weight:500;color:hsl(var(--primary));cursor:pointer;flex-shrink:0}

.nav{
  flex-shrink:0;background:hsl(var(--card));
  border-bottom:1px solid hsl(var(--border));
  display:flex;overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;
}
.nav::-webkit-scrollbar{display:none}
.nav-btn{
  flex-shrink:0;padding:10px 18px;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:500;
  color:hsl(var(--muted-foreground));border:none;background:none;
  border-bottom:2.5px solid transparent;cursor:pointer;
  white-space:nowrap;transition:color .12s;
}
.nav-btn.on{color:hsl(var(--foreground));border-bottom-color:hsl(var(--foreground))}

.main-scr{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;
  background:hsl(var(--background));
}
.main-scr::-webkit-scrollbar{display:none}

.sec{display:none;padding-bottom:100px}
.sec.on{display:block}
.sec-hd{
  padding:16px 16px 4px;
  display:flex;align-items:center;justify-content:space-between;
}
.sec-title{font-size:20px;font-weight:700;color:hsl(var(--foreground))}
.sec-act{font-size:14px;color:hsl(var(--primary));cursor:pointer;font-weight:500}

/* view pills */
.view-pills{
  display:flex;gap:6px;padding:10px 14px 0;
  overflow-x:auto;scrollbar-width:none;
}
.view-pills::-webkit-scrollbar{display:none}
.vpill{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  font-size:13px;font-weight:500;
  border:1px solid hsl(var(--border));background:hsl(var(--card));
  color:hsl(var(--muted-foreground));cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .12s;
}
.vpill.on{background:hsl(var(--foreground));border-color:hsl(var(--foreground));color:#fff}

/* ══════════════════════════════
   UNIFIED CARD
══════════════════════════════ */
.card{
  margin:8px 14px 0;
  background:hsl(var(--card));
  border:1px solid hsl(var(--border));
  border-radius:var(--r);
  overflow:visible;
  position:relative;
  /* soft shadow for depth */
  box-shadow:0 1px 3px rgba(45,42,38,.05);
}
.card.travel{border-left:3px solid hsl(var(--rose))}
.card.card-dragging{opacity:.35;pointer-events:none}
.card.card-drag-over{outline:2px solid hsl(var(--primary));border-radius:var(--r)}

.card-hd{
  padding:11px 14px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;gap:8px;
}
.card-hd.open{border-bottom:1px solid hsl(var(--border))}

/* ── INLINE HEADER LAYOUT ─────────────────
   Travel days: "3  ·  Fri 4/12  ·  Mammoth  · ✈ Travel"
   All on one line, no stacking
──────────────────────────────────────────── */
.card-hd-left{
  display:flex;align-items:baseline;gap:8px;flex:1;min-width:0;
  overflow:hidden;
}
/* The big day number */
.card-num{
  font-size:18px;font-weight:700;color:hsl(var(--foreground));
  line-height:1;flex-shrink:0;
}
/* Everything after it — inline, wraps gracefully */
.card-sub{
  font-size:13px;color:hsl(var(--muted-foreground));
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.3;
}
.dest-inline{font-weight:600}
/* Travel label — rose tint inline */
.travel-inline{
  color:hsl(var(--rose));font-weight:500;
}
/* For pack-section cards that have a bigger name */
.card-name{
  font-size:15px;font-weight:600;color:hsl(var(--foreground));line-height:1.2;
}
.card-desc{font-size:13px;color:hsl(var(--muted-foreground));margin-top:1px}

.card-hd-right{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.card-count{
  font-size:13px;color:hsl(var(--muted-foreground));
  background:hsl(var(--muted));border-radius:20px;
  padding:2px 9px;
}
/* edit dropdown */
.card-menu-btn{
  width:28px;height:28px;border-radius:var(--rsm);
  border:none;background:none;color:hsl(var(--muted-foreground));
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:10;letter-spacing:1px;line-height:1;
}
.card-menu-btn:active{background:hsl(var(--muted))}
.card-dropdown{
  position:absolute;top:calc(100%+4px);right:0;
  background:hsl(var(--card));border:1px solid hsl(var(--border));
  border-radius:var(--rs);box-shadow:0 6px 24px rgba(45,42,38,.12);
  z-index:100;min-width:160px;display:none;overflow:hidden;
}
.card-dropdown.open{display:block;animation:fadeIn .12s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dd-item{
  padding:11px 14px;font-size:14px;color:hsl(var(--card-foreground));
  cursor:pointer;display:flex;align-items:center;gap:8px;
}
.dd-item:hover,.dd-item:active{background:hsl(var(--muted))}
.dd-item.danger{color:#DC2626}
.dd-item+.dd-item{border-top:1px solid hsl(var(--border))}

.chevron{font-size:9px;color:hsl(var(--muted-foreground));transition:transform .18s}
.chevron.open{transform:rotate(180deg)}

.card-body{padding:12px 14px 14px;display:none;overflow:hidden}
.card-body.open{display:block}

/* ══════════════════════════════
   TOOLTIP
══════════════════════════════ */
.tip{
  position:fixed;z-index:400;
  background:hsl(var(--foreground));color:#fff;
  border-radius:var(--rs);padding:9px 13px;
  font-size:13px;line-height:1.5;max-width:220px;
  pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.18);
  display:none;
}
.tip.show{display:block;animation:tipIn .12s ease}
@keyframes tipIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.tip-name{font-weight:600;color:#fff;margin-bottom:2px}
.tip-cat{font-size:11px;color:rgba(255,255,255,.55);text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:6px}
.tip-item{display:block;font-size:12px;color:rgba(255,255,255,.82);padding:1px 0}

/* ══════════════════════════════
   DAY EDITOR
══════════════════════════════ */

/* Slot head — subtle, lowercase, tertiary */
.slot-head{
  font-size:12px;font-weight:500;
  color:hsl(var(--muted-foreground));
  margin-bottom:7px;
  /* NO uppercase, NO tracking — just quiet */
}
.slot-head+.slot-head{margin-top:14px}

.slot-editor{
  font-size:16px;line-height:1.7;
  color:hsl(var(--card-foreground));outline:none;
  min-height:28px;word-break:break-word;
  caret-color:hsl(var(--primary));
  -webkit-user-modify:read-write-plaintext-only;
}
.slot-editor:empty::before{
  content:attr(data-ph);color:hsl(var(--muted-foreground));pointer-events:none;
}
/* Activity keyword tint */
.slot-editor .linked{
  color:hsl(var(--primary));background:hsl(var(--secondary));
  border-radius:var(--rsm);padding:0 4px;cursor:default;
}
.slot-editor .linked.carry{color:hsl(var(--amb));background:hsl(var(--amb-bg))}
/* Flight code tint — distinct purple */
.slot-editor .flt-code{
  color:hsl(var(--flt));background:hsl(var(--flt-bg));
  border-radius:var(--rsm);padding:0 4px;cursor:pointer;
  font-weight:500;
}
/* Rich text bullets */
.slot-editor .bullet-line{
  display:flex;align-items:flex-start;gap:6px;
  padding-left:2px;
}
.slot-editor .bullet-line::before{
  content:'•';color:hsl(var(--muted-foreground));flex-shrink:0;
  margin-top:.05em;
}

.slot-divider{height:1px;background:hsl(var(--border));margin:13px 0;opacity:.5}
.notes-head{
  font-size:12px;font-weight:500;color:hsl(var(--muted-foreground));
  margin:14px 0 7px;
}
.notes-editor{
  font-size:15px;line-height:1.65;color:hsl(var(--card-foreground));
  outline:none;min-height:20px;word-break:break-word;
  caret-color:hsl(var(--primary));
  -webkit-user-modify:read-write-plaintext-only;
}
.notes-editor:empty::before{content:attr(data-ph);color:hsl(var(--muted-foreground));pointer-events:none}

/* Flight code inline info strip */
.flight-strip{
  display:flex;align-items:center;gap:10px;
  margin:5px 0 2px;padding:8px 11px;
  background:hsl(var(--flt-bg));border:1px solid hsl(var(--secondary-foreground));
  border-radius:var(--rs);font-size:13px;color:hsl(var(--card-foreground));
}
.fs-code{font-weight:700;color:hsl(var(--flt));font-size:14px}
.fs-info{flex:1;line-height:1.4}
.fs-tag{font-size:11px;color:hsl(var(--muted-foreground));margin-left:auto;flex-shrink:0}

/* Banners */
.banner{
  margin:10px 14px 0;padding:10px 14px;
  border-radius:var(--rs);font-size:14px;line-height:1.5;
}
.banner.warn{background:hsl(var(--amb-bg));color:hsl(var(--amb));border-left:3px solid #D97706}
.banner.info{background:hsl(var(--secondary));color:hsl(var(--primary));border-left:3px solid hsl(var(--primary))}
.banner strong{font-weight:600}

.smart-alert{
  padding:9px 14px;background:hsl(var(--rose-bg));
  font-size:14px;color:hsl(var(--rose));
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid hsl(var(--border));
}
.sa-text{flex:1;line-height:1.4}
.sa-skip{font-size:13px;color:hsl(var(--muted-foreground));cursor:pointer;padding:4px}

.add-day-wrap{margin:8px 14px 0;display:flex;flex-wrap:wrap;gap:6px}
.add-day-btn{
  padding:9px 14px;background:none;
  border:1px dashed hsl(var(--border));border-radius:var(--rs);
  font-family:'Inter',sans-serif;font-size:14px;color:hsl(var(--muted-foreground));cursor:pointer;
}
.add-day-btn:active{border-color:hsl(var(--primary));color:hsl(var(--primary))}

/* ══════════════════════════════
   OUTFITS PAGE
══════════════════════════════ */
.out-wrap{padding:0 14px 100px}
.out-view-toggle{display:flex;gap:6px;padding:8px 0 4px}
.out-toggle-btn{
  padding:5px 13px;border-radius:20px;
  font-size:13px;font-weight:500;
  border:1px solid hsl(var(--border));background:hsl(var(--card));
  color:hsl(var(--muted-foreground));cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .12s;
}
.out-toggle-btn.on{background:hsl(var(--foreground));border-color:hsl(var(--foreground));color:#fff}

.outfit-slot-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 0;border-bottom:1px solid hsl(var(--border));
}
.outfit-slot-row:last-child{border-bottom:none}
.osr-left{flex:1;min-width:0}
.osr-name{font-size:15px;color:hsl(var(--card-foreground));line-height:1.5}
.outfit-tip-target{
  cursor:default;color:hsl(var(--primary));background:hsl(var(--secondary));
  border-radius:var(--rsm);padding:0 4px;display:inline;
}
.outfit-tip-target.carry{color:hsl(var(--amb));background:hsl(var(--amb-bg))}
.osr-sources{font-size:12px;color:hsl(var(--muted-foreground));margin-top:2px}
.osr-right{flex-shrink:0}
.osr-count{
  font-size:12px;color:hsl(var(--muted-foreground));
  background:hsl(var(--muted));border-radius:20px;padding:2px 8px;
}

.out-empty{padding:32px 0;font-size:15px;color:hsl(var(--muted-foreground));text-align:center}
.odb-item{
  display:inline;font-size:14px;color:hsl(var(--primary));
  background:hsl(var(--secondary));border-radius:var(--rsm);padding:0 4px;
  margin:0 3px 4px 0;
}
.odb-item.carry{color:hsl(var(--amb));background:hsl(var(--amb-bg))}
.odb-add{display:inline;font-size:14px;color:hsl(var(--muted-foreground));cursor:pointer;padding:0 4px}
.odb-add:active{color:hsl(var(--primary))}

/* ══════════════════════════════
   PACKING LIST
══════════════════════════════ */
.pack-wrap{padding:0 14px 100px}
.pack-note{
  padding:9px 12px;background:hsl(var(--secondary));
  border-left:3px solid hsl(var(--primary));
  border-radius:0 var(--rs) var(--rs) 0;
  font-size:14px;color:hsl(var(--primary));line-height:1.5;margin:8px 0;
}
.pack-note strong{font-weight:600}
.card-group-list{display:flex;flex-direction:column}

.list-row{display:flex;align-items:center;gap:10px;padding:9px 0}
.list-row+.list-row{border-top:1px solid hsl(var(--border))}
.cb{
  width:22px;height:22px;border-radius:6px;
  border:1px solid hsl(var(--border));background:hsl(var(--background));
  flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,border-color .12s;
}
.cb.on{background:hsl(var(--foreground));border-color:hsl(var(--foreground))}
.cb.on::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.cb.green.on{background:hsl(var(--grn));border-color:hsl(var(--grn))}
.item-txt{flex:1;font-size:15px;color:hsl(var(--card-foreground));line-height:1.4}
.item-txt.done{text-decoration:line-through;color:hsl(var(--muted-foreground))}
.carry-lbl{
  font-size:12px;color:hsl(var(--amb));background:hsl(var(--amb-bg));
  border-radius:var(--rsm);padding:1px 7px;flex-shrink:0;
}
.item-note{font-size:12px;color:hsl(var(--muted-foreground));flex-shrink:0}
.from-lbl{font-size:12px;color:hsl(var(--muted-foreground));flex-shrink:0}
.synced-dot{
  width:5px;height:5px;border-radius:50%;
  background:hsl(var(--primary));flex-shrink:0;opacity:.5;
}
.row-add{font-size:14px;color:hsl(var(--muted-foreground));cursor:pointer;padding:9px 0}
.row-add:active{color:hsl(var(--primary))}
.add-card-btn{
  width:100%;margin-top:8px;padding:12px;
  border:1px dashed hsl(var(--border));border-radius:var(--r);
  background:none;font-family:'Inter',sans-serif;
  font-size:14px;color:hsl(var(--muted-foreground));cursor:pointer;text-align:center;
}
.add-card-btn:active{border-color:hsl(var(--primary));color:hsl(var(--primary))}

/* ══════════════════════════════
   SHEETS
══════════════════════════════ */
.overlay{
  position:fixed;inset:0;background:rgba(45,42,38,.45);
  z-index:200;display:none;align-items:flex-end;
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  touch-action:none;
}
.overlay.open{display:flex}
.sheet{
  background:hsl(var(--card));border-radius:20px 20px 0 0;
  width:100%;max-height:90vh;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  animation:sheetUp .2s ease;
}
.sheet::-webkit-scrollbar{display:none}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{
  width:36px;height:3px;background:hsl(var(--border));
  border-radius:2px;margin:12px auto 0;
}
.sheet-body{padding:16px 20px 48px}
.sheet-title{font-size:20px;font-weight:700;color:hsl(var(--foreground));margin-bottom:4px}
.sheet-sub{font-size:14px;color:hsl(var(--muted-foreground));margin-bottom:16px;line-height:1.5}
.sh-lbl{
  display:block;font-size:13px;font-weight:500;
  color:hsl(var(--muted-foreground));margin:14px 0 7px;
}
.sh-lbl:first-of-type{margin-top:2px}
.sh-inp{
  width:100%;background:hsl(var(--background));
  border:1px solid hsl(var(--border));border-radius:var(--rs);
  padding:12px 14px;font-family:'Inter',sans-serif;
  font-size:16px;color:hsl(var(--foreground));outline:none;
  margin-bottom:8px;transition:border-color .12s,box-shadow .12s;
}
.sh-inp:focus{border-color:hsl(var(--ring));box-shadow:0 0 0 2px hsl(var(--background)), 0 0 0 4px hsl(var(--ring))}
.sh-inp::placeholder{color:hsl(var(--muted-foreground))}
.sh-row{display:flex;gap:8px;margin-bottom:8px}
.sh-row .sh-inp{flex:1;margin-bottom:0}
.carry-row{display:flex;align-items:center;gap:10px;padding:6px 0 12px}
.carry-row input[type=checkbox]{width:20px;height:20px;accent-color:hsl(var(--primary));cursor:pointer;flex-shrink:0}
.carry-row label{font-size:15px;color:hsl(var(--card-foreground));cursor:pointer;line-height:1.4}
.sh-cta{
  width:100%;padding:14px;background:hsl(var(--primary));border:none;
  border-radius:var(--r);font-family:'Inter',sans-serif;
  font-size:16px;font-weight:600;color:hsl(var(--primary-foreground));cursor:pointer;margin-top:8px;
}
.sh-cta:hover{background:hsl(var(--primary)/.9)}
.sh-cta:active{background:hsl(var(--primary)/.8)}
.sh-cancel{
  width:100%;padding:10px;background:none;border:none;
  font-family:'Inter',sans-serif;font-size:15px;
  color:hsl(var(--muted-foreground));cursor:pointer;margin-top:4px;
}
.sh-cancel:hover{background:hsl(var(--secondary));color:hsl(var(--secondary-foreground))}
.sh-cta.danger{background:hsl(var(--destructive));color:hsl(var(--destructive-foreground))}
.sh-cta.danger:hover{background:hsl(var(--destructive)/.9)}

const Haptic={
  light(){if(navigator.vibrate)navigator.vibrate(8);else this._a(.02,80)},
  medium(){if(navigator.vibrate)navigator.vibrate([6,40,10]);else this._a(.04,120)},
  success(){if(navigator.vibrate)navigator.vibrate([8,30,8,30,16]);else this._a(.06,60)},
  _ctx:null,
  _a(g,ms){try{
    if(!this._ctx)this._ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=this._ctx.createOscillator(),gn=this._ctx.createGain();
    o.connect(gn);gn.connect(this._ctx.destination);o.frequency.value=440;
    gn.gain.setValueAtTime(g,this._ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(.001,this._ctx.currentTime+ms/1000);
    o.start();o.stop(this._ctx.currentTime+ms/1000);
  }catch(e){}}
};

function lookupFlight(code){
  // Mock — returns plausible-looking data based on code
  const num=parseInt(code.replace(/[A-Z\s]/g,''))||0;
  const depH=6+Math.floor(num%16);
  const dur=1+Math.floor(num%4);
  const arrH=depH+dur;
  const pad=h=>`${h%24}:${num%60<10?'0':''}${num%60}`;
  return{code,dep:pad(depH),arr:pad(arrH),
    status:'On time',duration:`${dur}h ${num%60}m`};
}

function destAdd(lid){

// ═══════════════════════════════════════
//  DRAG REORDER — generic pointer events
// ═══════════════════════════════════════
function initDrag(container,onDone){
  if(!container)return;
  let di=null,oi=null;
  const rows=()=>[...container.querySelectorAll(':scope>.dest-row,:scope>.et-dest-row,:scope>.card')];
  rows().forEach((row,idx)=>{
    const handle=row.querySelector('.drag-handle,.et-handle');
    const target=handle||row;
    if(target._db)return;target._db=true;
    target.addEventListener('pointerdown',e=>{
      if(handle&&e.target!==handle&&!handle.contains(e.target))return;
      e.preventDefault();di=idx;
      row.classList.add(handle?'dragging':'card-dragging');
      target.setPointerCapture(e.pointerId);Haptic.light();
    });
    target.addEventListener('pointermove',e=>{
      if(di===null)return;e.preventDefault();
      const all=rows();let no=null;
      all.forEach((r,i)=>{const rc=r.getBoundingClientRect();
        if(e.clientY>=rc.top&&e.clientY<=rc.bottom)no=i;});
      if(no!==null&&no!==oi){
        if(oi!==null)rows()[oi]?.classList.remove('drag-over','card-drag-over');
        oi=no;
        if(oi!==di)rows()[oi]?.classList.add(handle?'drag-over':'card-drag-over');
        Haptic.light();
      }
    });
    target.addEventListener('pointerup',()=>{
      if(di===null)return;
      rows().forEach(r=>r.classList.remove('dragging','drag-over','card-dragging','card-drag-over'));
      if(oi!==null&&oi!==di){
        const all=rows(),drag=all[di],tgt=all[oi];
        container.insertBefore(drag,di<oi?tgt.nextSibling:tgt);
        if(onDone)onDone(rows().map(r=>r.dataset.id).filter(Boolean));
        Haptic.success();
      }
      di=null;oi=null;
    });
  });
}

function buildDays(){
  days.forEach(d=>{
    ['day','night','note'].forEach(s=>{
      const el=document.getElementById(`ed-${s}-${d.id}`);
      if(el)d[s+'Text']=el.innerText;
    });
  });
  const prev=new Map(days.map(d=>[d.id,d]));
  days=[];
  const start=T.depDate?new Date(T.depDate+'T12:00:00'):new Date();
  let n=1;
  T.destinations.forEach((dest,di)=>{
    for(let d=0;d<dest.nights;d++){
      const date=new Date(start);date.setDate(start.getDate()+(n-1));
      const isFirst=n===1,isTransfer=d===dest.nights-1&&di<T.destinations.length-1;
      const isLast=di===T.destinations.length-1&&d===dest.nights-1;
      const id='d'+n,old=prev.get(id)||{};
      days.push({id,destIdx:di,dayNum:n,date,
        isTravel:isFirst||isTransfer||isLast,
        dayText:old.dayText||(isFirst||isTransfer?'Flight':''),
        nightText:old.nightText||'',noteText:old.noteText||'',
        _dismissed:old._dismissed||new Set(),
        _flightCodes:old._flightCodes||{},
      });
      n++;
    }
  });
}

// ─── FLIGHT STRIPS ───
function buildFlightStrips(day){
  const allText=day.dayText+' '+day.nightText;
  const codes=extractFlightCodes(allText);
  if(!codes.length)return'';
  return codes.map(code=>{
    const info=lookupFlight(code);
    return`<div class="flight-strip" onclick="event.stopPropagation()">
      <span class="fs-code">${esc(code)}</span>
      <span class="fs-info">${esc(info.dep)} → ${esc(info.arr)} · ${esc(info.duration)}</span>
      <span class="fs-tag">${esc(info.status)}</span>
    </div>`;
  }).join('');
}

function extractFlightCodes(text){
  // Match 2-letter airline code + 1-4 digit flight number
  const re=/\b([A-Z]{2})\s*(\d{1,4}[A-Z]?)\b/g;
  const codes=new Set();let m;
  while((m=re.exec(text))!==null){
    const code=m[1]+m[2];
    // Filter out obvious false positives
    const skip=['AM','PM','TV','PC','OK','NO','MY'];
    if(!skip.includes(m[1]))codes.add(code);
  }
  return[...codes];
}

// ─── HIGHLIGHT ENGINE ───
function highlightText(plain){
  if(!plain)return'';
  const lower=plain.toLowerCase();
  // Build match list from activities
  const matches=[];
  DETECT_SORTED.forEach(({word,act})=>{
    let idx=0;
    while((idx=lower.indexOf(word,idx))!==-1){
      const b=idx===0||/[\s,.\-–!?•\n]/.test(plain[idx-1]);
      const e2=idx+word.length;
      const a=e2>=plain.length||/[\s,.\-–!?•\n]/.test(plain[e2]);
      if(b&&a&&!matches.some(m=>!(e2<=m.s||idx>=m.e)))
        matches.push({s:idx,e:e2,type:'act',act,word:plain.slice(idx,e2)});
      idx++;
    }
  });
  // Flight codes
  const fltRe=/\b([A-Z]{2})\s*(\d{1,4}[A-Z]?)\b/g;
  const skip=['AM','PM','TV','PC','OK','NO','MY'];
  let fm;
  while((fm=fltRe.exec(plain))!==null){
    if(skip.includes(fm[1]))continue;
    const s=fm.index,e2=fm.index+fm[0].length;
    if(!matches.some(m=>!(e2<=m.s||s>=m.e)))
      matches.push({s,e:e2,type:'flt',word:fm[0].replace(/\s/,'')});
  }
  matches.sort((a,b)=>a.s-b.s);

  let out='',pos=0;
  // Process line by line to handle bullets
  const lines=plain.split('\n');
  let charPos=0;
  lines.forEach((line,li)=>{
    const lineStart=charPos,lineEnd=charPos+line.length;
    const isBullet=line.startsWith('• ');
    const lineText=isBullet?line.slice(2):line;
    const lineTextStart=isBullet?lineStart+2:lineStart;

    if(isBullet){
      out+=`<span class="bullet-line" data-line="${li}">`;
    }
    // Render matches within this line
    let lp=lineTextStart;
    matches.filter(m=>m.s>=lineTextStart&&m.e<=lineEnd).sort((a,b)=>a.s-b.s).forEach(m=>{
      if(m.s>lp) out+=esc(plain.slice(lp,m.s));
      if(m.type==='act'){
        out+=`<span class="linked" data-act="${m.act.id}">${esc(m.word)}</span>`;
      }else{
        out+=`<span class="flt-code" data-flt="${esc(m.word)}">${esc(m.word)}</span>`;
      }
      lp=m.e;
    });
    if(lp<lineEnd) out+=esc(plain.slice(lp,lineEnd));
    if(isBullet) out+='</span>';
    if(li<lines.length-1) out+='<br>';
    charPos=lineEnd+1; // +1 for \n
  });
  return out;
}

function buildEdHTML(text){
  if(!text)return'';
  return highlightText(text);
}

function rehighlight(el){
  const sel=window.getSelection();if(!sel||!sel.rangeCount)return;
  const range=sel.getRangeAt(0);
  const pre=range.cloneRange();
  pre.selectNodeContents(el);pre.setEnd(range.endContainer,range.endOffset);
  const offset=pre.toString().length;
  el.innerHTML=highlightText(esc(el.innerText));
  restoreCaret(el,offset);
}
function restoreCaret(el,offset){
  try{
    const sel=window.getSelection(),range=document.createRange();
    let chars=0,found=false;
    function walk(node){if(found)return;
      if(node.nodeType===3){const n=chars+node.length;
        if(n>=offset){range.setStart(node,offset-chars);range.collapse(true);found=true;}
        else chars=n;}
      else node.childNodes.forEach(walk);}
    walk(el);
    if(!found){range.selectNodeContents(el);range.collapse(false);}
    sel.removeAllRanges();sel.addRange(range);
  }catch(e){}
}

// ─── BULLET KEY HANDLER ───
// On Enter: if current line starts with • stay in bullet mode
// On "-" at start of line: convert to bullet
function attachBulletKey(elId){
  const el=document.getElementById(elId);if(!el)return;
  el.addEventListener('keydown',e=>{
    if(e.key==='-'){
      const sel=window.getSelection();if(!sel||!sel.rangeCount)return;
      const range=sel.getRangeAt(0);
      // Check if cursor is at start of a text node / line
      const pre=range.cloneRange();
      pre.selectNodeContents(el);pre.setEnd(range.startContainer,range.startOffset);
      const textBefore=pre.toString();
      // At start of a line if nothing before or previous char is \n
      const atLineStart=textBefore===''||textBefore.endsWith('\n');
      if(atLineStart){
        e.preventDefault();
        document.execCommand('insertText',false,'• ');
        Haptic.light();
      }
    }
    if(e.key==='Enter'){
      const sel=window.getSelection();if(!sel||!sel.rangeCount)return;
      const range=sel.getRangeAt(0);
      const pre=range.cloneRange();
      pre.selectNodeContents(el);pre.setEnd(range.startContainer,range.startOffset);
      const textBefore=pre.toString();
      const lastNewline=textBefore.lastIndexOf('\n');
      const currentLine=lastNewline===-1?textBefore:textBefore.slice(lastNewline+1);
      if(currentLine.startsWith('• ')){
        if(currentLine==='• '){
          // Empty bullet — exit bullet mode: remove the •
          e.preventDefault();
          // Delete back 2 chars (• and space) and insert plain newline
          document.execCommand('delete',false);
          document.execCommand('delete',false);
        }else{
          e.preventDefault();
          document.execCommand('insertText',false,'\n• ');
          Haptic.light();
        }
      }
    }
  });
}

// ─── EDITOR ATTACHMENT ───
function attachEditor(elId,dayId,slot){
  const el=document.getElementById(elId);if(!el)return;
  let lastDet=new Set(),timer=null;
  // Tooltip on activity spans
  el.addEventListener('mouseover',e=>{
    const span=e.target.closest('.linked');if(!span)return;
    const act=ACT_DB.find(a=>a.id===span.dataset.act);if(!act)return;
    showTip(span,{type:'activity',act});
  });
  el.addEventListener('mouseout',e=>{if(!e.target.closest('.linked,.flt-code'))hideTip();});
  // Tooltip on flight codes
  el.addEventListener('mouseover',e=>{
    const span=e.target.closest('.flt-code');if(!span)return;
    const info=lookupFlight(span.dataset.flt||span.textContent);
    showTip(span,{type:'flight',info});
  });
  el.addEventListener('touchstart',e=>{
    const linked=e.target.closest('.linked');
    const flt=e.target.closest('.flt-code');
    if(linked){const act=ACT_DB.find(a=>a.id===linked.dataset.act);if(act){showTip(linked,{type:'activity',act});setTimeout(hideTip,2500);}}
    if(flt){const info=lookupFlight(flt.dataset.flt||flt.textContent);showTip(flt,{type:'flight',info});setTimeout(hideTip,2500);}
  },{passive:true});

  el.addEventListener('input',()=>{
    const d=days.find(x=>x.id===dayId);if(!d)return;
    const txt=el.innerText;
    if(slot==='day')d.dayText=txt;else d.nightText=txt;
    clearTimeout(timer);
    timer=setTimeout(()=>{
      const newDet=new Set(detectActs(txt).map(a=>a.id));
      let hasNew=false;newDet.forEach(id=>{if(!lastDet.has(id))hasNew=true;});
      if(hasNew){Haptic.light();lastDet=newDet;}
      // Check for new flight codes
      const codes=extractFlightCodes(txt);
      if(codes.length)Haptic.light();
      rehighlight(el);
      // Rebuild flight strips
      const strips=document.querySelector(`#card-${dayId} .flight-strip`)?.parentElement;
      if(strips){
        const newStrips=buildFlightStrips(d);
        // Update strips area
        const card=document.getElementById('card-'+dayId);
        if(card){
          const existing=card.querySelector('.flight-strip-wrap');
          if(existing)existing.innerHTML=newStrips||'';
        }
      }
      renderOutfits();renderPack();
    },420);
  });
}

function detectActs(text){
  const lower=text.toLowerCase();const found=new Set();
  DETECT_SORTED.forEach(({word,act})=>{if(found.has(act.id))return;
    const idx=lower.indexOf(word);if(idx===-1)return;
    const b=idx===0||/[\s,.\-–•\n]/.test(text[idx-1]);
    const e2=idx+word.length;
    const a=e2>=text.length||/[\s,.\-–!?•\n]/.test(text[e2]);
    if(b&&a)found.add(act.id);});
  return[...found].map(id=>ACT_DB.find(a=>a.id===id)).filter(Boolean);
}
function getOutfitFromText(text,slot){
  const s=new Set();
  detectActs(text).forEach(a=>(slot==='day'?a.day:a.night).forEach(i=>s.add(i)));
  return[...s];
}

function showTip(el,data){
  const tip=document.getElementById('tip');
  if(data.type==='activity'){
    document.getElementById('tipName').textContent=data.act.label;
    document.getElementById('tipCat').textContent=data.act.category;
    const items=[...data.act.day,...data.act.night];
    document.getElementById('tipItems').innerHTML=items.map(i=>`<span class="tip-item">${esc(i)}</span>`).join('');
  }else if(data.type==='outfit'){
    document.getElementById('tipName').textContent=data.slotName;
    document.getElementById('tipCat').textContent='outfit item';
    document.getElementById('tipItems').innerHTML=data.sources.map(s=>
      `<span class="tip-item">${esc(s.actLabel)} · ${s.days.join(', ')}</span>`).join('');
  }else if(data.type==='flight'){
    const info=data.info;
    document.getElementById('tipName').textContent=info.code;
    document.getElementById('tipCat').textContent='flight';
    document.getElementById('tipItems').innerHTML=
      `<span class="tip-item">Dep ${esc(info.dep)} · Arr ${esc(info.arr)}</span>
       <span class="tip-item">Duration ${esc(info.duration)}</span>
       <span class="tip-item">${esc(info.status)}</span>`;
  }
  tip.style.display='block';
  const rect=el.getBoundingClientRect();
  const tw=tip.offsetWidth||200,th=tip.offsetHeight||80;
  let left=rect.left,top=rect.top-th-8;
  if(left+tw>window.innerWidth-8)left=window.innerWidth-tw-8;
  if(top<8)top=rect.bottom+8;
  tip.style.left=Math.max(8,left)+'px';tip.style.top=top+'px';
  tip.classList.add('show');
}
function hideTip(){
  const tip=document.getElementById('tip');
  tip.classList.remove('show');tip.style.display='none';
}

function renderOutfits(){
  const wrap=document.getElementById('outfitContent');
  const perDay=days.map(day=>{
    const dest=T.destinations[day.destIdx];
    const d=[...getOutfitFromText(day.dayText||'','day'),...(customOut[day.id+'day']||[])];
    const n=[...getOutfitFromText(day.nightText||'','night'),...(customOut[day.id+'night']||[])];
    return{day,dest,d,n};
  }).filter(x=>x.d.length||x.n.length);

  const slotMap=new Map();
  perDay.forEach(({day,d,n})=>{
    const label=`Day ${day.dayNum}`;
    const addToMap=(items,slot)=>{
      items.forEach(item=>{
        if(!slotMap.has(item))slotMap.set(item,{sources:[],carry:CARRY_SET.has(item)});
        const entry=slotMap.get(item);
        const srcActs=detectActs(slot==='day'?day.dayText||'':day.nightText||'')
          .filter(a=>(slot==='day'?a.day:a.night).includes(item));
        if(srcActs.length){
          srcActs.forEach(act=>{
            let src=entry.sources.find(s=>s.actLabel===act.label);
            if(!src){src={actLabel:act.label,actId:act.id,days:[]};entry.sources.push(src);}
            src.days.push(label);
          });
        }else{
          let src=entry.sources.find(s=>s.actLabel==='Custom');
          if(!src){src={actLabel:'Custom',actId:'',days:[]};entry.sources.push(src);}
          src.days.push(label);
        }
      });
    };
    addToMap(d,'day');addToMap(n,'night');
  });

  const toggle=`<div class="out-view-toggle">
    <button class="out-toggle-btn${outView==='pack'?' on':''}" onclick="setOutView('pack')">Packing view</button>
    <button class="out-toggle-btn${outView==='day'?' on':''}" onclick="setOutView('day')">By day</button>
  </div>`;

  if(!slotMap.size){
    wrap.innerHTML=toggle+`<div class="out-empty">Type activities in your day editors to see outfit suggestions.</div>`;
    return;
  }

  let html=toggle;
  if(outView==='pack'){
    html+=`<div style="margin-top:12px">`;
    [...slotMap.entries()].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([name,data])=>{
      const total=data.sources.reduce((s,src)=>s+src.days.length,0);
      const tipData=JSON.stringify(data.sources);
      html+=`<div class="outfit-slot-row">
        <div class="osr-left">
          <div class="osr-name">
            <span class="outfit-tip-target${data.carry?' carry':''}"
              data-slot="${esc(name)}" data-tip="${esc(tipData)}">${esc(name)}</span>
          </div>
          <div class="osr-sources">${data.sources.map(s=>esc(s.actLabel)).join(', ')}</div>
        </div>
        <div class="osr-right">
          ${total>1?`<span class="osr-count">×${total}</span>`:''}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }else{
    perDay.forEach(({day,dest,d,n})=>{
      const isOpen=openCards.has('out-'+day.id);
      html+=`<div class="card" id="card-out-${day.id}">
        <div class="card-hd${isOpen?' open':''}" onclick="toggleOCard('${day.id}')">
          <div class="card-hd-left">
            <div class="card-num">${day.dayNum}</div>
            <div class="card-sub">${DOW[day.date.getDay()]} ${fmt(day.date)} · <span style="color:${dest.color};font-weight:600">${esc(dest.name)}</span></div>
          </div>
          <div class="card-hd-right">
            <span class="card-count">${d.length+n.length} items</span>
            <span class="chevron${isOpen?' open':''}">▼</span>
          </div>
        </div>
        <div class="card-body${isOpen?' open':''}">
          ${d.length?`<div class="slot-head">day</div><div style="margin-bottom:8px;line-height:2">
            ${d.map(i=>`<span class="odb-item${CARRY_SET.has(i)?' carry':''}">${esc(i)}</span>`).join(' ')}
            <span class="odb-add" onclick="openAddOutfit('${day.id}','day')">+ item</span>
          </div>`:''}
          ${n.length?`<div class="slot-head" style="${d.length?'margin-top:10px':''}">evening</div><div style="line-height:2">
            ${n.map(i=>`<span class="odb-item${CARRY_SET.has(i)?' carry':''}">${esc(i)}</span>`).join(' ')}
            <span class="odb-add" onclick="openAddOutfit('${day.id}','night')">+ item</span>
          </div>`:''}
        </div>
      </div>`;
    });
  }

  wrap.innerHTML=html;

  // Attach outfit tooltips
  wrap.querySelectorAll('.outfit-tip-target').forEach(el=>{
    const raw=el.dataset.tip;if(!raw)return;
    try{
      const sources=JSON.parse(raw);
      const slotName=el.dataset.slot;
      el.addEventListener('mouseenter',()=>showTip(el,{type:'outfit',slotName,sources}));
      el.addEventListener('mouseleave',hideTip);
      el.addEventListener('touchstart',()=>{showTip(el,{type:'outfit',slotName,sources});setTimeout(hideTip,2500);},{passive:true});
    }catch(e){}
  });
}
function setOutView(v){outView=v;Haptic.light();renderOutfits();}
function toggleOCard(id){openCards.has('out-'+id)?openCards.delete('out-'+id):openCards.add('out-'+id);Haptic.light();renderOutfits();}
function openAddOutfit(dayId,slot){
  const day=days.find(d=>d.id===dayId);
  aiCtx={type:'outfit',dayId,slot};
  document.getElementById('ai-title').textContent='Add outfit item';
  document.getElementById('ai-sub').textContent=`Day ${day.dayNum} · ${slot==='day'?'Daytime':'Evening'}`;
  document.getElementById('ai-inp').value='';
  document.getElementById('ai-carry-row').style.display='flex';
  document.getElementById('ai-carry').checked=false;

function setPackView(v){
  packView=v;
  document.querySelectorAll('.vpill').forEach((b,i)=>{
    b.classList.toggle('on',['day','bag','purpose'][i]===v);});
  const sa=document.getElementById('packSecAct');
  if(v==='day'){
    sa.textContent='';sa.onclick=null;
  }else{
    const labels={bag:'+ Bag',purpose:'+ Group'};
    sa.textContent=labels[v];sa.onclick=()=>openAddGroup(v);
  }
  Haptic.light();renderPack();
}
function renderPack(){
  const allText=days.map(d=>d.dayText+' '+d.nightText).join(' ').toLowerCase();
  if(/snowboard|skiing/.test(allText)&&!CATS.find(c=>c.id==='snowgear')){
    CATS.push({id:'snowgear',name:'Snow gear',type:'sup',desc:'Equipment for the mountain'});
    PURPOSES.push({id:'snowgear',name:'Snow gear'});
    catOrder.push('snowgear');purposeOrder.push('snowgear');
    [['Snowboard / skis','trunk'],['Helmet','trunk'],['Boot bag','trunk'],['Poles','trunk']]
      .forEach(([n,b])=>ITEMS.push(mkItem(n,'snowgear',b,'snowgear',false,'',true)));
  }
  if(/camp|camping|tent/.test(allText)&&!CATS.find(c=>c.id==='campgear')){
    CATS.push({id:'campgear',name:'Camping gear',type:'sup',desc:''});
    PURPOSES.push({id:'campgear',name:'Camping gear'});
    catOrder.push('campgear');purposeOrder.push('campgear');
    [['Sleeping bag','trunk'],['Tent','trunk'],['Headlamp','backpack'],['Blanket','trunk']]
      .forEach(([n,b])=>ITEMS.push(mkItem(n,'campgear',b,'campgear',false,'',true)));
  }
  let html='';
  if(packView==='day') html=renderByDay();
  else if(packView==='bag') html=renderByBag();
  else html=renderByPurpose();
  document.getElementById('packContent').innerHTML=html;
  const cgl=document.getElementById('cardGroupList');
  if(cgl)initDrag(cgl,newOrder=>{
    if(packView==='day') {} // No ordering for days
    else if(packView==='bag')bagOrder=newOrder.filter(Boolean);
    else purposeOrder=newOrder.filter(Boolean);
  });
  document.querySelectorAll('.card-menu-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      document.querySelectorAll('.card-dropdown').forEach(d=>d.classList.remove('open'));
      btn.nextElementSibling?.classList.toggle('open');
    });
  });
}

function renderByDay(){
  let h=`<div class="pack-note">Items marked <strong>carry</strong> go in your bag or backpack, not checked luggage.</div>
    <div class="card-group-list" id="cardGroupList">`;

  days.forEach(day=>{
    const items=ITEMS.filter(i=>i.dayIds.includes(day.id));
    const done=items.filter(i=>i.checked).length;
    const open=openCards.has('day-'+day.id);
    h+=packCard({id:'day-'+day.id,gid:day.id,name:'Day '+day.dayNum,sub:DOW[day.date.getDay()]+' '+fmt(day.date),
      count:`${done}/${items.length}`,open,editType:'day',
      body:items.map(i=>itemRow(i)).join('')+`<div class="row-add" onclick="openAddItem('day','${day.id}')">+ Add item</div>`});
  });

  const unassigned=ITEMS.filter(i=>i.dayIds.length===0);
  const uDone=unassigned.filter(i=>i.checked).length;
  const uOpen=openCards.has('day-unassigned');
  h+=packCard({id:'day-unassigned',gid:'unassigned',name:'Unassigned to days',sub:'Items packed but not tied to a specific day',
    count:`${uDone}/${unassigned.length}`,open:uOpen,editType:'day',
    body:unassigned.map(i=>itemRow(i)).join('')+`<div class="row-add" onclick="openAddItem('day','unassigned')">+ Add item</div>`});

      count:`${done}/${items.length}`,open,editType:'bag',

function renderByPurpose(){

function itemRow(item,showBag=false){
  const ck=item.checked;
  return`<div class="list-row" data-item-id="${item.id}" draggable="true" ondragstart="event.dataTransfer.setData('itemId', '${item.id}')">
    <div class="cb${ck?' on':''}" onclick="toggleItem('${item.id}')"></div>
    <div class="item-txt${ck?' done':''}">${esc(item.name)}</div>
    ${item.carry?`<span class="carry-lbl">carry</span>`:''}
    ${item.note?`<span class="item-note">${esc(item.note)}</span>`:''}
    ${showBag&&item.categoryIds?.length?`<span class="from-lbl">${esc(CATS.find(c=>c.id===item.categoryIds[0])?.name||'')}</span>`:''}
    <div class="synced-dot" title="Synced across all views"></div>
  </div>`;
}
function handleItemDrop(event, type, targetId) {
  event.preventDefault();
  const card = event.currentTarget;
  card.classList.remove('card-drag-over');
  const itemId = event.dataTransfer.getData('itemId');
  if (!itemId) return;
  const item = ITEMS.find(i => i.id === itemId);
  if (!item) return;

  if (type === 'day') {
    if (targetId === 'unassigned') item.dayIds = [];
    else if (!item.dayIds.includes(targetId)) item.dayIds.push(targetId);
  } else if (type === 'bag') {
    if (!item.bagIds.includes(targetId)) item.bagIds.push(targetId);
  } else if (type === 'purpose') {
    if (!item.purposeIds.includes(targetId)) item.purposeIds.push(targetId);
  }

  Haptic.medium();
  renderPack();
}

function packCard({id,gid,name,sub,count,open,editType,body}){
  return`<div class="card" id="crd-${id}" data-id="${id}" ondragover="event.preventDefault(); this.classList.add('card-drag-over')" ondragleave="this.classList.remove('card-drag-over')" ondrop="handleItemDrop(event, '${editType || 'day'}', '${gid}')">
    <div class="card-hd${open?' open':''}" onclick="togglePackCard('${id}')">
      <div class="card-hd-left">
        <div class="card-name">${esc(name)}</div>
        ${sub?`<div class="card-desc">${esc(sub)}</div>`:''}
      </div>
      <div class="card-hd-right">
        <span class="card-count">${count}</span>
        <button class="card-menu-btn" aria-label="Options">⋯
          <div class="card-dropdown">
            <div class="dd-item" onclick="openEditGroup('${editType}','${gid}')">Rename / edit</div>
            <div class="dd-item danger" onclick="removeGroup('${editType}','${gid}')">Remove</div>
          </div>
        </button>
        <span class="chevron${open?' open':''}">▼</span>
      </div>
    </div>
    <div class="card-body${open?' open':''}">${body}</div>
  </div>`;
}
function togglePackCard(id){

  const card=document.getElementById('crd-'+id);
  const hd=card?.querySelector('.card-hd');

}
function toggleItem(itemId){
  const item=ITEMS.find(i=>i.id===itemId);if(!item)return;
  item.checked=!item.checked;Haptic.medium();
  document.querySelectorAll(`[data-item-id="${itemId}"]`).forEach(row=>{
    row.querySelector('.cb')?.classList.toggle('on',item.checked);
    row.querySelector('.item-txt')?.classList.toggle('done',item.checked);
  });
  document.querySelectorAll('.card-count').forEach(el=>{
    const body=el.closest('.card')?.querySelector('.card-body');if(!body)return;
    const rows=body.querySelectorAll('[data-item-id]');
    const done=[...rows].filter(r=>r.querySelector('.cb.on')).length;
    el.textContent=`${done}/${rows.length}`;

function openAddItem(viewType,groupId){

    viewType==='bag'?BAGS.find(b=>b.id===groupId)?.name:PURPOSES.find(p=>p.id===groupId)?.name;

function openEditGroup(type,id){

function commitEdit(){
  if(!editCtx)return;
  const nm=document.getElementById('edit-name').value.trim();if(!nm)return;
  const dc=document.getElementById('edit-desc').value.trim();
  if(editCtx.type==='cat'){const c=CATS.find(x=>x.id===editCtx.id);if(c){c.name=nm;c.desc=dc;}}
  else if(editCtx.type==='bag'){const b=BAGS.find(x=>x.id===editCtx.id);if(b){b.name=nm;b.desc=dc;}}
  else{const p=PURPOSES.find(x=>x.id===editCtx.id);if(p)p.name=nm;}

function commitRemove(){if(editCtx)removeGroup(editCtx.type,editCtx.id);}
function removeGroup(type,id){
  if(type==='cat'){CATS=CATS.filter(c=>c.id!==id);ITEMS=ITEMS.filter(i=>i.categoryId!==id);catOrder=catOrder.filter(x=>x!==id);}
  else if(type==='bag'){BAGS=BAGS.filter(b=>b.id!==id);bagOrder=bagOrder.filter(x=>x!==id);}
  else{PURPOSES=PURPOSES.filter(p=>p.id!==id);purposeOrder=purposeOrder.filter(x=>x!==id);}

function commitGroup(){

  if(agCtx?.type==='category'){CATS.push({id,name:nm,desc:dc,type:'custom'});catOrder.push(id);}
  else if(agCtx?.type==='bag'){BAGS.push({id,name:nm,desc:dc});bagOrder.push(id);}

// ═══════════════════════════════════════
//  COMMIT ITEM
// ═══════════════════════════════════════
function commitItem(){
  const nm=document.getElementById('ai-inp').value.trim();if(!nm||!aiCtx)return;
  const carry=document.getElementById('ai-carry').checked;
  const isRoutine = document.getElementById('ai-routine').checked;

  if(aiCtx.type==='outfit'){
    const key=aiCtx.dayId+aiCtx.slot;
    if(!customOut[key])customOut[key]=[];
    customOut[key].push(nm);if(carry)CARRY_SET.add(nm);
    closeAll();Haptic.medium();renderOutfits();
  }else if(aiCtx.type==='packitem'){
    let catId='health',bagId='main',purId='toiletry';
    if(aiCtx.viewType==='cat'){catId=aiCtx.groupId;purId=CATS.find(c=>c.id===aiCtx.groupId)?.type==='toi'?'toiletry':'tech';}
    else if(aiCtx.viewType==='bag'){bagId=aiCtx.groupId;}
    else if(aiCtx.viewType==='pur'){purId=aiCtx.groupId;}
    ITEMS.push(mkItem(nm,catId,bagId,purId,carry));

    if(isRoutine){
      ITEMS[ITEMS.length-1].dayIds = days.map(d=>d.id);
    } else if (aiCtx.viewType === 'day' && aiCtx.groupId !== 'unassigned') {
      ITEMS[ITEMS.length-1].dayIds = [aiCtx.groupId];
    }

    showToast('Saved to Closet');
    closeAll();Haptic.medium();renderPack();
  }
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:hsl(var(--primary));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px;display:none;z-index:1000';
    document.body.appendChild(toast);
  }
  toast.innerText = msg;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 2000);
}

  row.innerHTML=`<span class="et-handle">⠿</span>
    <input class="sh-inp" style="flex:1;margin-bottom:0" placeholder="Destination" autocomplete="off">
    <input class="sh-inp sf-mini" style="margin-bottom:0" type="number" min="1" placeholder="nts">
    <button class="dest-rm" onclick="destRm(this)">×</button>`;
  dc.appendChild(row);initDrag(dc);Haptic.light();
}
function saveTrip(){
  T.name=document.getElementById('et-name').value.trim()||T.name;
  T.depDate=document.getElementById('et-depd').value||T.depDate;
  T.depTime=document.getElementById('et-dept').value||T.depTime;
  T.retDate=document.getElementById('et-retd').value||T.retDate;
  readDests('etDestList');buildDays();closeAll();Haptic.success();renderAll();
}

// ═══════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════
function openOv(id){closeAll();document.getElementById(id).classList.add('open');}
function closeAll(){
  document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('open'));
  document.querySelectorAll('.card-dropdown').forEach(d=>d.classList.remove('open'));
}
function goNav(id){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('nb-'+id).classList.add('on');
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-'+id).classList.add('on');
  document.getElementById('mainScr').scrollTop=0;
  Haptic.light();
  if(id==='pack'){setPackView(packView);}
  if(id==='outfits')renderOutfits();
}
</script>
